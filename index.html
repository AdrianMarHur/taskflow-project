<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenamiento Semanal</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script> tailwind.config = { darkMode: "class" }; </script>

  <!-- Evitar FOUC aplicando tema antes de render -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem("tema");
        const preferDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored ? stored === "dark" : preferDark)
          document.documentElement.classList.add("dark");
      } catch {}
    })();
  </script>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- HEADER -->
  <header class="bg-blue-800 dark:bg-slate-800 text-white py-4 shadow">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold tracking-wide">Entrenamiento Semanal</h1>

      <nav class="flex gap-3 md:gap-6">
        <span class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600">Inicio</span>
        <span class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 md:ml-10">Semana</span>
      </nav>

      <!-- Botón de tema -->
      <button id="theme-toggle"
              class="px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 text-xl shadow"
              aria-label="Cambiar a tema oscuro"
              aria-pressed="false">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-6 py-6 flex flex-col lg:flex-row gap-4">

    <!-- ✅ ASIDE AHORA ARRIBA EN MOVIL -->
    <aside class="w-full lg:w-64 order-1 lg:order-2 bg-white dark:bg-slate-800 
                 border border-slate-300 dark:border-slate-600 rounded p-4 shadow">
      <h3 class="text-lg font-medium mb-3">Intensidad</h3>
      <ul class="grid gap-3">
        <li class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-red-600"></span>Alta</li>
        <li class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-orange-400"></span>Media</li>
        <li class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-teal-500"></span>Baja</li>
      </ul>
    </aside>

    <!-- 🔽 SECTION AHORA DEBAJO EN MOVIL -->
    <section class="flex-1 order-2 lg:order-1 bg-white dark:bg-slate-800 
                     border border-slate-300 dark:border-slate-600 rounded p-4 shadow">

      <h2 class="text-xl font-semibold mb-4">Entrenamientos de la semana</h2>

      <!-- Buscador -->
      <input id="task-search"
             type="text"
             placeholder="Buscar tarea…"
             aria-label="Buscar entrenamientos por nombre"
             class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 mb-4" />

      <!-- Filtros -->
      <div class="flex flex-wrap gap-2 mb-4" role="group" aria-label="Filtros de tareas">
        <button type="button"
                class="task-filter px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900"
                data-filter="all" aria-pressed="true">
          Todas
        </button>
        <button type="button"
                class="task-filter px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900"
                data-filter="active" aria-pressed="false">
          Pendientes
        </button>
        <button type="button"
                class="task-filter px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900"
                data-filter="done" aria-pressed="false">
          Completadas
        </button>
      </div>

      <!-- Filtro por intensidad + orden -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        <div>
          <label for="intensity-filter" class="block text-sm font-medium mb-1">
            Filtrar por intensidad
          </label>
          <select id="intensity-filter"
                  class="w-full rounded-lg border border-slate-300 dark:border-slate-600
                         bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 px-3 py-2">
            <option value="all">Todas</option>
            <option value="high">Alta</option>
            <option value="medium">Media</option>
            <option value="low">Baja</option>
          </select>
        </div>

        <div>
          <label for="sort-tasks" class="block text-sm font-medium mb-1">
            Ordenar
          </label>
          <select id="sort-tasks"
                  class="w-full rounded-lg border border-slate-300 dark:border-slate-600
                         bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 px-3 py-2">
            <option value="manual">Orden manual (arrastrar)</option>
            <option value="newest">Más nuevas</option>
            <option value="oldest">Más antiguas</option>
            <option value="intensity-desc">Intensidad (Alta → Baja)</option>
            <option value="intensity-asc">Intensidad (Baja → Alta)</option>
          </select>
        </div>
      </div>

      <!-- Formulario -->
      <section class="mb-4">
        <div id="form-error-summary"
             class="hidden mb-3 rounded border border-red-300 bg-red-50 text-red-800 px-3 py-2 text-sm"
             role="alert" aria-live="polite"></div>

        <h3 class="text-lg font-medium mb-3">Añadir tarea</h3>

        <form id="task-form" autocomplete="off"
              class="grid grid-cols-1 sm:grid-cols-3 gap-3" novalidate>

          <div class="sm:col-span-2">
            <input id="task-input" type="text" placeholder="Nueva tarea..."
                   aria-describedby="task-input-error"
                   class="w-full rounded-lg border border-slate-300 dark:border-slate-600
                          bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200
                          placeholder:text-slate-400 dark:placeholder:text-slate-500 px-3 py-2" />
            <p id="task-input-error" class="mt-1 text-sm text-red-600 hidden"></p>
          </div>

          <div>
            <select id="intensity-select" aria-describedby="intensity-select-error"
                    class="w-full rounded-lg border border-slate-300 dark:border-slate-600
                           bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200
                           px-3 py-2 font-semibold capitalize">
              <option value="high">Alta</option>
              <option value="medium">Media</option>
              <option value="low">Baja</option>
            </select>
            <p id="intensity-select-error" class="mt-1 text-sm text-red-600 hidden"></p>
          </div>

          <button type="submit"
                  id="task-submit"
                  class="rounded-lg bg-blue-800 px-4 py-2 text-white hover:bg-blue-700">
            Añadir
          </button>

        </form>
      </section>
      <button id="delete-all" type="button"
              class="mb-4 px-3 py-1.5 rounded-lg bg-red-500 text-white hover:bg-red-600"
              aria-label="Borrar todas las tareas">
        Eliminar todo
      </button>

      <p id="loading-state" class="hidden mt-3 text-sm text-slate-500 dark:text-slate-400">
          ⏳ Cargando tareas...
      </p>

      <ul class="task-list divide-y divide-slate-300 dark:divide-slate-700" aria-live="polite"></ul>

      <p id="empty-state"
         class="mt-3 text-sm text-slate-500 dark:text-slate-400">
         No hay entrenamientos todavía. Añade el primero arriba.
      </p>

    </section>

  </main>

  <p id="live" class="sr-only" aria-live="polite"></p>

  <script type="module" src="app.js"></script>
</body>
</html>
