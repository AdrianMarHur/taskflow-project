
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Semanal</title>
</head>

<body>

                <span>Yoga y estiramientos</span>

        </ul>

    </section>

    <aside class="opciones">
        <h3>Intensidad</h3>
        <ul class="lateral">
            <li><span class="alta"></span> Alta intensidad</li>
            <li><span class="media"></span> Media intensidad</li>
