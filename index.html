<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Semanal</title>
</head>

<body>

<header>
    <div class="wrap">
        <h1>Entrenamiento Semanal</h1>

        <nav class="menu">
            <span class="menu-item">Inicio</span>
            <span class="menu-item">Semana</span>
        </nav>
    </div>
</header>

<main class="contenedor">

    <section class="lista-entrenos">
        <h2>Entrenamientos de la semana</h2>
        <input 
            type="text" 
            id="buscar-tarea"
            placeholder="Buscar tarea..."
            class="input-buscar"
        >

        <section class="agregar-tarea">
            <h3>Añadir tarea</h3>

            <form id="form-tarea" autocomplete="off">
                <input 
                    type="text"
                    id="input-tarea"
                    placeholder="Nueva tarea..."
                    required
                >

                <select id="select-intensidad" required>
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>

                <button type="submit">Añadir</button>
            </form>
        </section>

        <!--Lista modificable -->
        <ul class="lista-semanal"></ul>

    </section>

    <aside class="opciones">
        <h3>Intensidad</h3>
        <ul class="lateral">
            <li><span class="alta"></span> Alta intensidad</li>
            <li><span class="media"></span> Media intensidad</li>
            <li><span class="baja"></span> Baja intensidad</li>
        </ul>
    </aside>

</main>

<script src="app.js"></script>

</body>
</html>
